name: Update M3U Playlist

on:
  schedule:
    - cron: "0 * * * *"   # প্রতি ১ ঘন্টা
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python stablesportstv.py

      - name: Commit & push
        run: |
          git config --global user.name "stable-bot"
          git config --global user.email "bot@example.com"
          git add "STABLE-SPORTS TV.m3u"
          git commit -m "🔄 Auto update playlist" || echo "No changes"
          git push
