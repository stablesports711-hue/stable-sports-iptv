name: 10-Min Auto Update

on:
  schedule:
    - cron: '*/10 * * * *' # প্রতি ১০ মিনিট পর পর
  workflow_dispatch: # দরকার হলে হাত দিয়েও রান করতে পারবেন

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ফাইল সেভ করার পারমিশন
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Run Script
        run: python update_m3u.py

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "STABLE-SPORTS TV.m3u"
          git commit -m "Auto Update Channel List" || echo "No changes"
          git push
