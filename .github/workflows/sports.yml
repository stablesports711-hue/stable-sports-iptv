name: Stable Sports TV Auto Update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python stable_sports_tv.py

      - name: Push file
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add "STABLE-SPORTS TV.m3u"
          git commit -m "update sports tv" || echo "no change"
          git push
  
